name: Android CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      # Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'

      # Accept Android SDK licenses
      - name: Accept SDK Licenses
        run: yes | sdkmanager --licenses || true

      # Install required SDK components
      - name: Install SDK Components
        run: |
          sdkmanager "platform-tools" "platforms;android-${{ env.ANDROID_COMPILE_SDK }}" "build-tools;${{ env.ANDROID_BUILD_TOOLS }}"

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      # Generate Gradle Wrapper (always regenerate to ensure JAR exists)
      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=8.5 --distribution-type=bin
          chmod +x ./gradlew

      # Create local.properties with SDK path
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties

      # Cache Gradle dependencies
      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Download dependencies
      - name: Download Dependencies
        run: ./gradlew dependencies --no-daemon

      # Run lint check
      - name: Run Lint
        run: ./gradlew lint --no-daemon
        continue-on-error: true

      # Build debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # Build release APK (unsigned)
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        continue-on-error: true

      # Upload Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # Upload Release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # Upload Lint Report
      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint*.html
          retention-days: 7

  # Optional: Run unit tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=8.5 --distribution-type=bin
          chmod +x ./gradlew

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon
        continue-on-error: true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 7

  # Release job (triggered only on main/master push)
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: ./apks

      - name: Get version from gradle
        id: version
        run: |
          VERSION=$(grep "versionName" app/build.gradle.kts | head -1 | grep -oP '"\K[^"]+')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: Release v${{ steps.version.outputs.version }} (Build ${{ github.run_number }})
          draft: false
          prerelease: true
          files: ./apks/*.apk
          body: |
            ## Coordinate Extractor
            
            **Build:** ${{ github.run_number }}
            **Version:** ${{ steps.version.outputs.version }}
            **Commit:** ${{ github.sha }}
            
            ### Changes
            - Auto-generated release from CI/CD pipeline
            
            ### Installation
            1. Download the APK file
            2. Enable "Install from unknown sources" on your device
            3. Install the APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
